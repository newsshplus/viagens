name: Busca de passagens (multi-fonte)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [search-now]

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Rodar buscas
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WHATSAPP_NUMBER: ${{ secrets.WHATSAPP_NUMBER }}
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE: ${{ secrets.EVOLUTION_INSTANCE }}
        run: python backend/run_searches.py

      - name: Commitar historico de precos atualizado
        run: |
          git config user.name "viagens-bot"
          git config user.email "actions@github.com"
          git add web/data/price_history.json
          git diff --quiet --cached || git commit -m "Atualiza historico de precos [skip ci]"
          git push
