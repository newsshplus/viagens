<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viagens Smart - Painel de Busca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #e4e4e7;
      --muted: #71717a;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    header p { color: var(--muted); font-size: 0.875rem; }
    .status-bar {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .status-item {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .status-item.active { border-color: var(--green); color: var(--green); }
    .status-item.inactive { border-color: var(--muted); color: var(--muted); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    thead th {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    tbody td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:hover { background: var(--surface); }
    .price {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1rem;
    }
    .price.green { color: var(--green); }
    .price.yellow { color: var(--yellow); }
    .price.red { color: var(--red); }
    .badge {
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-weight: 600;
    }
    .badge.green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge.red { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.blue { background: rgba(59,130,246,0.15); color: var(--blue); }
    .source { font-size: 0.7rem; color: var(--muted); }
    .xref { font-size: 0.65rem; color: var(--muted); margin-top: 0.25rem; }
    a.buy-btn {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      border-radius: 0.375rem;
      background: var(--blue);
      color: white;
      text-decoration: none;
      font-weight: 500;
    }
    a.buy-btn:hover { opacity: 0.85; }
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty h2 {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .sparkline { display: inline-block; vertical-align: middle; }
    @media (max-width: 768px) {
      body { padding: 1rem; }
      table { font-size: 0.75rem; }
      thead th, tbody td { padding: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>✈️ Viagens Smart</h1>
      <p>Historico de precos · Busca multi-fonte · Cross-reference</p>
      <div class="status-bar" id="status-bar"></div>
    </header>
    <main id="content">
      <div class="empty">
        <h2>Carregando dados...</h2>
        <p>Se o historico nao carregar, verifique se web/data/price_history.json existe.</p>
      </div>
    </main>
  </div>

  <script>
    const HISTORY_URL = 'data/price_history.json';

    async function loadData() {
      try {
        const res = await fetch(HISTORY_URL);
        if (!res.ok) throw new Error('Arquivo nao encontrado');
        return await res.json();
      } catch {
        return null;
      }
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return iso.slice(0, 10);
    }

    function formatPrice(price, currency) {
      return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: currency || 'EUR',
      }).format(price);
    }

    function getStatus(entry) {
      const status = entry.status || 'watching';
      const labels = {
        notified: { label: 'Notificado', cls: 'green' },
        drop: { label: 'Preco caiu', cls: 'yellow' },
        watching: { label: 'Monitorando', cls: 'blue' },
      };
      return labels[status] || labels.watching;
    }

    function getTrend(history) {
      if (!history || history.length < 2) return null;
      const recent = history.slice(-5);
      const avgRecent = recent.reduce((s, h) => s + h.price, 0) / recent.length;
      const older = history.slice(0, -5);
      if (older.length === 0) return null;
      const avgOlder = older.reduce((s, h) => s + h.price, 0) / older.length;
      const pct = ((avgRecent - avgOlder) / avgOlder) * 100;
      return pct < -5 ? '↓' : pct > 5 ? '↑' : '→';
    }

    function getTrendColor(history) {
      const trend = getTrend(history);
      if (trend === '↓') return 'var(--green)';
      if (trend === '↑') return 'var(--red)';
      return 'var(--muted)';
    }

    function renderSparkline(history, width = 60, height = 20) {
      if (!history || history.length < 2) return '';
      const prices = history.slice(-10).map(h => h.price);
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;
      const points = prices.map((p, i) => {
        const x = (i / (prices.length - 1)) * width;
        const y = height - ((p - min) / range) * height;
        return `${x},${y}`;
      }).join(' ');
      const trend = getTrend(history);
      const color = trend === '↓' ? 'var(--green)' : trend === '↑' ? 'var(--red)' : 'var(--muted)';
      return `<svg class="sparkline" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5"/>
      </svg>`;
    }

    function render(entries) {
      const content = document.getElementById('content');
      const statusBar = document.getElementById('status-bar');

      const totalRoutes = entries.length;
      const notified = entries.filter(e => e.status === 'notified').length;
      const dropping = entries.filter(e => e.status === 'drop').length;

      statusBar.innerHTML = `
        <span class="status-item active">📡 ${totalRoutes} rotas monitoradas</span>
        <span class="status-item ${notified > 0 ? 'active' : 'inactive'}">🔔 ${notified} notificados</span>
        <span class="status-item ${dropping > 0 ? 'active' : 'inactive'}">📉 ${dropping} em queda</span>
      `;

      if (entries.length === 0) {
        content.innerHTML = `
          <div class="empty">
            <h2>Nenhum dado ainda</h2>
            <p>Execute as buscas via GitHub Actions para popular os dados.</p>
          </div>`;
        return;
      }

      const rows = entries
        .sort((a, b) => a.last_price - b.last_price)
        .map(entry => {
          const status = getStatus(entry);
          const trend = getTrend(entry.history);
          const trendColor = getTrendColor(entry.history);
          const sparkline = renderSparkline(entry.history);
          const route = `${entry.origin} → ${entry.destination}`;

          return `<tr>
            <td>
              <strong>${route}</strong>
              <div class="source">${entry.profile_name || ''}</div>
            </td>
            <td>${formatDate(entry.depart_date)}</td>
            <td>${formatDate(entry.return_date)}</td>
            <td class="price ${status.cls}">${formatPrice(entry.last_price, entry.currency)}</td>
            <td>
              <span class="badge ${status.cls}">${status.label}</span>
              <div class="xref">${entry.source || '—'}</div>
            </td>
            <td>
              ${sparkline}
              <span style="color:${trendColor};font-size:0.8rem;margin-left:0.25rem">${trend || ''}</span>
            </td>
            <td>
              ${entry.booking_link ? `<a href="${entry.booking_link}" target="_blank" class="buy-btn">Comprar</a>` : '—'}
            </td>
          </tr>`;
        })
        .join('');

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Rota</th>
              <th>Ida</th>
              <th>Volta</th>
              <th>Preco</th>
              <th>Status</th>
              <th>Tendencia</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    loadData().then(data => {
      if (!data) {
        document.getElementById('content').innerHTML = `
          <div class="empty">
            <h2>Dados indisponiveis</h2>
            <p>Nao foi possivel carregar o historico. Verifique a configuracao.</p>
          </div>`;
        return;
      }
      const entries = Object.values(data);
      render(entries);
    });
  </script>
</body>
</html>
